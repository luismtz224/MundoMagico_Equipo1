<style>
  .au-title { font-size: 28px; font-weight: 700; color: #111; margin: 0 0 24px 0; }
  .au-table-wrap { border: 1px solid #ddd; border-radius: 6px; overflow: hidden; margin-bottom: 24px; }
  .au-table { width: 100%; border-collapse: collapse; }
  .au-table thead tr { background: #f0f0f0; }
  .au-table th { padding: 12px 16px; font-size: 14px; font-weight: 600; color: #333; text-align: left; border-bottom: 1px solid #ddd; }
  .au-table td { padding: 13px 16px; font-size: 14px; color: #222; border-bottom: 1px solid #eee; }
  .au-table tbody tr:last-child td { border-bottom: none; }
  .au-actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .au-btn { padding: 11px 22px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; background: #5b4cf5; color: #fff; }
  .au-btn:hover { background: #4839d4; }
  .au-btn.danger { background: #e74c3c; }
  .au-btn.danger:hover { background: #c0392b; }

  /* Modal */
  .au-modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:1000; justify-content:center; align-items:center; }
  .au-modal-overlay.active { display:flex; }
  .au-modal { background:white; padding:30px; border-radius:10px; width:400px; box-shadow:0 10px 30px rgba(0,0,0,0.2); }
  .au-modal h3 { margin:0 0 20px 0; font-size:1.1rem; }
  .au-modal label { display:block; font-size:0.85rem; font-weight:bold; margin-bottom:4px; margin-top:12px; }
  .au-modal input, .au-modal select { width:100%; padding:10px; border:1px solid #ddd; border-radius:4px; font-size:0.9rem; }
  .au-modal-btns { display:flex; gap:10px; margin-top:20px; justify-content:flex-end; }
  .au-modal-btns button { padding:10px 20px; border:none; border-radius:6px; cursor:pointer; font-weight:600; }
  .au-modal-btns .btn-cancel { background:#eee; color:#555; }
  .au-modal-btns .btn-save { background:#5b4cf5; color:white; }
</style>

<div class="p-4">
  <h2 class="au-title">Administrar usuarios</h2>

  <div class="au-table-wrap">
    <table class="au-table">
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Usuario</th>
          <th>Contraseña</th>
          <th>Rol</th>
        </tr>
      </thead>
      <tbody id="tablaCuerpoUsuarios"></tbody>
    </table>
  </div>

  <div class="au-actions">
    <button class="au-btn" onclick="abrirModalCrear()">Crear nuevo usuario</button>
    <button class="au-btn" onclick="abrirModalEditar()">Editar usuario existente</button>
    <button class="au-btn danger" onclick="desactivarUsuario()">Desactivar usuario</button>
  </div>
</div>

<!-- Modal Crear/Editar -->
<div class="au-modal-overlay" id="modalUsuario">
  <div class="au-modal">
    <h3 id="modal-titulo">Crear nuevo usuario</h3>
    <input type="hidden" id="modal-id">
    <label>Nombre Completo:</label>
    <input type="text" id="modal-nombre" placeholder="Ej. Juan Pérez">
    <label>Usuario:</label>
    <input type="text" id="modal-user" placeholder="Ej. juan123">
    <label>Contraseña:</label>
    <input type="password" id="modal-pass" placeholder="Contraseña">
    <label>Rol:</label>
    <select id="modal-rol">
      <option value="Dueño">Dueño</option>
      <option value="Encargado">Encargado</option>
    </select>
    <div class="au-modal-btns">
      <button class="btn-cancel" onclick="cerrarModal()">Cancelar</button>
      <button class="btn-save" onclick="guardarUsuario()">Guardar</button>
    </div>
  </div>
</div>
