<div class="login-card">
    <img src="https://img.icons8.com/fluency/96/user-male-circle.png" width="80">
    <h2>Sistema Salón</h2>
    <p>Inicia sesión para entrar</p>
    
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    
    <button class="btn-login" onclick="validar()">Entrar al Sistema</button>

</div>

<script src="modulos/login/login.js"></script>
