<div class="login-card" id="loginCard">
    <h2>Iniciar Sesión</h2>
    <input type="text" id="user" placeholder="Nombre de usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn-login" onclick="validar()">Ingresar</button>
    <p class="error-msg" id="error">Usuario o contraseña incorrectos</p>
</div>
 
<div class="welcome-card" id="welcomeCard">
    <h2>Bienvenida</h2>
    <div class="welcome-info">
        <p><span>Nombre:</span> <span id="wNombre"></span></p>
        <p><span>Rol:</span> <span id="wRol"></span></p>
        <p><span>Hora de inicio de sesión:</span> <span id="wHora"></span></p>
    </div>
    <button class="btn-continuar" onclick="continuar()">Continuar</button>
</div>
